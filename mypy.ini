[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = False

# Ignore missing stubs for these modules
[mypy-frontmatter.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-cli_agent_orchestrator.adapters.database]
ignore_missing_imports = True

# Allow SQLAlchemy ORM issues
[mypy-cli_agent_orchestrator.clients.database]
disable_error_code = misc,assignment,arg-type

[mypy-cli_agent_orchestrator.agent]
disable_error_code = assignment,no-redef

[mypy-cli_agent_orchestrator.clients.baton_store]
disable_error_code = arg-type

[mypy-cli_agent_orchestrator.clients.flow_store]
disable_error_code = arg-type,call-arg,no-any-return

[mypy-cli_agent_orchestrator.clients.inbox_store]
disable_error_code = assignment,arg-type

[mypy-cli_agent_orchestrator.provider_conversations.persistence]
disable_error_code = assignment,arg-type,no-any-return

[mypy-cli_agent_orchestrator.services.baton_service]
disable_error_code = assignment,arg-type

[mypy-cli_agent_orchestrator.services.baton_watchdog_service]
disable_error_code = assignment,arg-type,return-value,no-any-return

# Ignore specific issues in CLI commands
[mypy-cli_agent_orchestrator.cli.commands.install]
disable_error_code = assignment

# Ignore MCP server Any return types
[mypy-cli_agent_orchestrator.mcp_server.server]
disable_error_code = no-any-return
